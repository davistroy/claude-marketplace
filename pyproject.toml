[tool.pytest.ini_options]
testpaths = [
    "tests",
    "plugins/bpmn-plugin/tools/bpmn2drawio/tests",
    "plugins/personal-plugin/tools/feedback-docx-generator/tests",
    "plugins/personal-plugin/tools/research-orchestrator/tests",
    "plugins/personal-plugin/tools/visual-explainer/tests",
]
python_files = ["test_*.py"]
python_functions = ["test_*"]
pythonpath = [
    "plugins/bpmn-plugin/tools/bpmn2drawio/src",
    "plugins/personal-plugin/tools/feedback-docx-generator/src",
    "plugins/personal-plugin/tools/research-orchestrator/src",
    "plugins/personal-plugin/tools/visual-explainer/src",
]
addopts = "--import-mode=importlib"
asyncio_mode = "auto"
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "slow: marks tests as slow-running (deselect with '-m \"not slow\"')",
]
